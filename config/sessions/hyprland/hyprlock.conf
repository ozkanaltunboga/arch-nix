# ============================================================
# hyprlock.conf
# ML4W-inspired lock screen for arch-nix.
# ============================================================

$lock_cache = $HOME/.cache/arch-nix/lockscreen
$primary = rgba(cba6f7ff)
$accent = rgba(89dcebff)
$text = rgba(f5f3ffff)
$muted = rgba(cdd6f4dd)
$surface = rgba(1e1e2ee6)
$surface_soft = rgba(313244aa)
$error = rgba(f38ba8ff)
$shadow = rgba(000000a8)

general {
    ignore_empty_input = true
    hide_cursor = false
}

background {
    monitor =
    path = $lock_cache/blurred_wallpaper.png
    color = rgba(11111bff)
}

# Center artwork, cropped from the active wallpaper.
image {
    monitor =
    path = $lock_cache/square_wallpaper.png
    size = 320
    rounding = 42
    border_size = 4
    border_color = $primary $accent 45deg
    rotate = 0
    reload_time = -1
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 8
    shadow_size = 24
    shadow_color = $shadow
    shadow_boost = 1.35
}

# Main clock, anchored like ML4W: quiet, large, bottom-right.
label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 78
    font_family = JetBrains Mono ExtraBold
    position = -70, 122
    halign = right
    valign = bottom
    shadow_passes = 6
    shadow_size = 18
    shadow_color = $shadow
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $muted
    font_size = 20
    font_family = JetBrains Mono
    position = -72, 88
    halign = right
    valign = bottom
    shadow_passes = 4
    shadow_size = 12
    shadow_color = $shadow
}

label {
    monitor =
    text = $USER
    color = $primary
    font_size = 20
    font_family = JetBrains Mono Bold
    position = -72, 52
    halign = right
    valign = bottom
    shadow_passes = 4
    shadow_size = 12
    shadow_color = $shadow
}

# Password pill.
input-field {
    monitor =
    size = 300, 56
    outline_thickness = 3
    dots_size = 0.30
    dots_spacing = 0.18
    dots_center = true
    dots_rounding = -1
    outer_color = $primary
    inner_color = $surface
    font_color = $text
    font_family = JetBrains Mono
    placeholder_text = <i>Input Password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    check_color = $accent
    fail_color = $error
    capslock_color = $error
    numlock_color = -1
    bothlock_color = -1
    rounding = 14
    fade_on_empty = false
    hide_input = false
    position = 0, -72
    halign = center
    valign = center
    shadow_passes = 8
    shadow_size = 22
    shadow_color = $shadow
    shadow_boost = 1.35
}
