# ============================================================
# hyprlock.conf
# Modern lock screen inspired by ML4W's Hyprlock flow.
# ============================================================

$lock_cache = $HOME/.cache/arch-nix/lockscreen
$primary = rgba(89b4faff)
$text = rgba(cdd6f4ff)
$muted = rgba(a6adc8ff)
$surface = rgba(1e1e2edd)
$surface_strong = rgba(11111bee)
$error = rgba(f38ba8ff)
$shadow = rgba(00000088)

general {
    ignore_empty_input = true
    hide_cursor = false
}

background {
    monitor =
    path = $lock_cache/blurred_wallpaper.png
    color = rgba(11111bff)
}

image {
    monitor =
    path = $lock_cache/square_wallpaper.png
    size = 300
    rounding = 34
    border_size = 3
    border_color = $primary
    position = 0, 160
    halign = center
    valign = center
    shadow_passes = 4
    shadow_size = 18
    shadow_color = $shadow
}

label {
    monitor =
    text = cmd[update:1000] date +"%H:%M"
    color = $text
    font_size = 82
    font_family = JetBrains Mono ExtraBold
    position = 0, -120
    halign = center
    valign = top
    shadow_passes = 3
    shadow_size = 10
    shadow_color = $shadow
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %d %B"
    color = $muted
    font_size = 22
    font_family = JetBrains Mono
    position = 0, -220
    halign = center
    valign = top
    shadow_passes = 2
    shadow_size = 8
    shadow_color = $shadow
}

label {
    monitor =
    text = $USER
    color = $primary
    font_size = 20
    font_family = JetBrains Mono Bold
    position = 0, -58
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.22
    dots_center = true
    dots_rounding = -1
    outer_color = $primary
    inner_color = $surface
    font_color = $text
    font_family = JetBrains Mono
    placeholder_text = <i>Enter password...</i>
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    check_color = $primary
    fail_color = $error
    capslock_color = $error
    rounding = 14
    fade_on_empty = false
    hide_input = false
    position = 0, -115
    halign = center
    valign = center
    shadow_passes = 3
    shadow_size = 14
    shadow_color = $shadow
}
