# ============================================================
# hyprland.conf
# NixOS Home Manager modüllerinden dönüştürüldü:
#   default.nix + binds.nix + animations.nix +
#   monitors.nix + window-rules.nix + autostart.nix
# ============================================================

# ─── MONITORS ───────────────────────────────────────────────
monitor = eDP-1, 1920x1080@144, 0x0, 1.0

# ─── INPUT ──────────────────────────────────────────────────
input {
    kb_layout  = us, ru
    kb_options = grp:alt_shift_toggle
    kb_variant =
    kb_model   =
    kb_rules   =

    touchpad {
        natural_scroll = true
    }

    accel_profile = flat
}

# ─── GENERAL ────────────────────────────────────────────────
general {
    border_size            = 0
    gaps_in                = 4
    gaps_out               = 4
    float_gaps             = 6
    resize_on_border       = true
    extend_border_grab_area = 30
}

# ─── DECORATION ─────────────────────────────────────────────
decoration {
    rounding         = 4
    active_opacity   = 1.0
    inactive_opacity = 1.0

    blur {
        enabled = false
    }

    shadow {
        enabled = false
    }
}

# ─── ANIMATIONS ─────────────────────────────────────────────
animations {
    enabled = yes

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows,              1, 5, myBezier, popin 80%
    animation = windowsOut,           1, 5, myBezier, popin 80%
    animation = layers,               1, 5, myBezier, fade
    animation = layersIn,             1, 5, myBezier, fade
    animation = layersOut,            1, 5, myBezier, fade
    animation = fade,                 1, 5, myBezier
    animation = workspaces,           1, 5, myBezier, slide
    animation = specialWorkspaceIn,   1, 5, myBezier, fade
    animation = specialWorkspaceOut,  1, 5, myBezier, fade
}

# ─── MISC ───────────────────────────────────────────────────
misc {
    font_family             = JetBrains Mono
    disable_hyprland_logo   = true
    disable_splash_rendering = true
}

# ─── AUTOSTART ──────────────────────────────────────────────
exec-once = swww-daemon
exec-once = hypridle
exec-once = playerctld
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user enable --now easyeffects
exec-once = bash ~/.config/hypr/scripts/volume_listener.sh
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'ArcMidnight-Cursors'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/TopBar.qml
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py
exec-once = swaync
exec-once = swayosd-server

# ─── KEYBINDS ───────────────────────────────────────────────
$mainMod = SUPER
$terminal = kitty

gesture = 3, horizontal, workspace

# --- Mouse binds ---
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# --- Resize ---
binde = $mainMod&SHIFT_L, left,  resizeactive, -50 0
binde = $mainMod&SHIFT_L, right, resizeactive,  50 0
binde = $mainMod&SHIFT_L, up,    resizeactive,   0 -50
binde = $mainMod&SHIFT_L, down,  resizeactive,   0  50

# --- Locked binds (media/OSD) ---
bindl = , Caps_Lock,          exec, sleep 0.1 && swayosd-client --caps-lock
bindl = $mainMod, SPACE,      exec, playerctl play-pause
bindl = , XF86AudioPause,     exec, playerctl play-pause
bindl = , XF86AudioPlay,      exec, playerctl play-pause
bindl = , xf86AudioMicMute,   exec, swayosd-client --input-volume mute-toggle
bindl = , xf86audiomute,      exec, swayosd-client --output-volume mute-toggle
bindl = , XF86MonBrightnessDown, exec, swayosd-client --brightness lower
bindl = , XF86MonBrightnessUp,   exec, swayosd-client --brightness raise
bindl = , Print,              exec, ~/.config/hypr/scripts/screenshot.sh
bindl = SHIFT_L, Print,       exec, ~/.config/hypr/scripts/screenshot.sh --edit
bindl = , XF86PowerOff,       exec, bash ~/.config/hypr/scripts/lock.sh

# --- Volume (repeat-enabled) ---
bindel = , xf86audiolowervolume, exec, swayosd-client --output-volume lower
bindel = , xf86audioraisevolume, exec, swayosd-client --output-volume raise
bindel = $mainMod, L,            exec, bash ~/.config/hypr/scripts/lock.sh

# --- App launchers ---
bind = $mainMod, D,       exec, bash ~/.config/hypr/scripts/rofi_show.sh drun
bind = ALT, TAB,          exec, bash ~/.config/hypr/scripts/rofi_show.sh window
bind = $mainMod, C,       exec, bash ~/.config/hypr/scripts/rofi_clipboard.sh

# --- Quickshell widget'lar ---
bind = $mainMod, M,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle monitors
bind = $mainMod, A,           exec, swaync-client -t -sw
bind = $mainMod&SHIFT_L, S,   exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle stewart
bind = $mainMod, Q,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle music
bind = $mainMod, B,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle battery
bind = $mainMod, W,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle wallpaper
bind = $mainMod, S,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle calendar
bind = $mainMod, N,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle network
bind = $mainMod&SHIFT_L, T,   exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle focustime
bind = $mainMod, V,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle volume
bind = $mainMod, H,           exec, bash ~/.config/hypr/scripts/qs_manager.sh toggle guide

# --- Uygulamalar ---
bind = $mainMod, F,      exec, firefox
bind = $mainMod, E,      exec, nautilus
bind = $mainMod, T,      exec, Telegram
bind = $mainMod, O,      exec, obsidian
bind = $mainMod, RETURN, exec, $terminal

# --- Pencere yönetimi ---
bind = $mainMod&SHIFT_L, F, togglefloating,
bind = ALT, F4, exec, bash -c 'if hyprctl activewindow | grep -q "title: qs-master"; then ~/.config/hypr/scripts/qs_manager.sh close; else hyprctl dispatch killactive; fi'

bind = $mainMod&CTRL, left,  movewindow, l
bind = $mainMod&CTRL, right, movewindow, r
bind = $mainMod&CTRL, up,    movewindow, u
bind = $mainMod&CTRL, down,  movewindow, d

bind = $mainMod, left,  movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up,    movefocus, u
bind = $mainMod, down,  movefocus, d

# --- Workspace geçişi (qs_manager üzerinden) ---
bind = $mainMod, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1
bind = $mainMod, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2
bind = $mainMod, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3
bind = $mainMod, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4
bind = $mainMod, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5
bind = $mainMod, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6
bind = $mainMod, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7
bind = $mainMod, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8
bind = $mainMod, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9
bind = $mainMod, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10

bind = $mainMod SHIFT, 1, exec, ~/.config/hypr/scripts/qs_manager.sh 1 move
bind = $mainMod SHIFT, 2, exec, ~/.config/hypr/scripts/qs_manager.sh 2 move
bind = $mainMod SHIFT, 3, exec, ~/.config/hypr/scripts/qs_manager.sh 3 move
bind = $mainMod SHIFT, 4, exec, ~/.config/hypr/scripts/qs_manager.sh 4 move
bind = $mainMod SHIFT, 5, exec, ~/.config/hypr/scripts/qs_manager.sh 5 move
bind = $mainMod SHIFT, 6, exec, ~/.config/hypr/scripts/qs_manager.sh 6 move
bind = $mainMod SHIFT, 7, exec, ~/.config/hypr/scripts/qs_manager.sh 7 move
bind = $mainMod SHIFT, 8, exec, ~/.config/hypr/scripts/qs_manager.sh 8 move
bind = $mainMod SHIFT, 9, exec, ~/.config/hypr/scripts/qs_manager.sh 9 move
bind = $mainMod SHIFT, 0, exec, ~/.config/hypr/scripts/qs_manager.sh 10 move

# ─── LAYER RULES ────────────────────────────────────────────
layerrule = noanim, ^(volume_osd)$
layerrule = noanim, ^(brightness_osd)$
layerrule = noanim, hyprpicker
layerrule = noanim, qsdock
layerrule = blur,          ext-session-lock
layerrule = ignorealpha 0.2, ext-session-lock

# ─── WINDOW RULES ───────────────────────────────────────────
windowrulev2 = immediate,        class:^(cs2)$
windowrulev2 = keepaspectratio,  class:^(cs2)$

windowrulev2 = float,            title:^(app-launcher)$
windowrulev2 = center,           title:^(app-launcher)$
windowrulev2 = size 1200 600,    title:^(app-launcher)$
windowrulev2 = animation slide,  title:^(app-launcher)$
