exec-once = awww-daemon
exec-once = hypridle
exec-once = playerctld
exec-once = bash ~/.config/hypr/scripts/init.sh
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = systemctl --user enable --now easyeffects
exec-once = bash ~/.config/hypr/scripts/volume_listener.sh
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Breeze_Snow'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'adw-gtk3-dark'
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/Main.qml
exec-once = quickshell -p ~/.config/hypr/scripts/quickshell/TopBar.qml
exec-once = bash ~/.config/hypr/scripts/startup_guide.sh
exec-once = python3 ~/.config/hypr/scripts/quickshell/focustime/focus_daemon.py
exec-once = swaync
exec-once = swayosd-server
exec-once = bash ~/.config/nwg-dock-hyprland/launch.sh
