#  ◈ WINDOW & LAYER RULES
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

# ─── Layer rules (OSD / overlays) ───────────────────────────
layerrule = animation none ^(volume_osd)$
layerrule = animation none ^(brightness_osd)$
layerrule = animation none hyprpicker
layerrule = animation none qsdock
layerrule = blur qsdock
layerrule = blur ext-session-lock

# ─── Window rules ───────────────────────────────────────────
windowrule = immediate class:^(cs2)$

windowrule = float title:^(app-launcher)$
windowrule = center title:^(app-launcher)$
windowrule = size 1200 600 title:^(app-launcher)$
windowrule = animation slide title:^(app-launcher)$
