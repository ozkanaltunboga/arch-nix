# Gaming Window Rules for Hyprland
# Bu kuralları ~/.config/hypr/hyprland.conf dosyasına ekleyin

# Steam
windowrule = float, title:^(Steam)$
windowrule = float, title:^(Steam Settings)$
windowrule = float, class:^(steam)$
windowrule = workspace 5 silent, class:^(steam)$

# Games - Fullscreen optimizasyonları
windowrule = fullscreen, class:^(cs2)$
windowrule = fullscreen, class:^(dota2)$
windowrule = fullscreen, class:^(csgo_linux64)$
windowrule = fullscreen, title:^(Counter-Strike)
windowrule = fullscreen, title:^(Dota 2)

# Immediate rendering (input lag azaltma)
windowrule = immediate, class:^(cs2)$
windowrule = immediate, class:^(dota2)$
windowrule = immediate, class:^(csgo_linux64)$
windowrule = immediate, title:^(Counter-Strike)
windowrule = immediate, title:^(Dota 2)

# Lutris
windowrule = float, title:^(Lutris)$
windowrule = workspace 5 silent, class:^(lutris)$

# Heroic Games Launcher
windowrule = float, title:^(Heroic Games Launcher)$
windowrule = workspace 5 silent, class:^(heroic)$

# ProtonUp-Qt
windowrule = float, title:^(ProtonUp-Qt)$

# GOverlay
windowrule = float, title:^(GOverlay)$

# Discord (oyun modunda)
windowrule = workspace 6 silent, class:^(discord)$
windowrule = float, title:^(Discord Settings)$

# Wine/Proton uygulamaları
windowrule = float, title:^(Wine Configuration)$
windowrule = float, class:^(winecfg)$

# GameScope
windowrule = fullscreen, class:^(gamescope)$
windowrule = immediate, class:^(gamescope)$
