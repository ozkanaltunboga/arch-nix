# MangoHud Configuration
# FPS ve sistem bilgisi overlay

# FPS counter
fps
fps_color=FFFFFF
fps_position=top-right
font_size=24

# Frame timing
frametime
frametime_pos=top-right

# GPU bilgileri
gpu_stats
gpu_temp
gpu_color=2ECC71

# CPU bilgileri
cpu_stats
cpu_temp
cpu_color=3498DB

# RAM kullanımı
ram
ram_color=E74C3C

# VRAM kullanımı
vram
vram_color=F39C12

# Engine bilgisi
engine_version
vulkan_driver

# Wine/Proton bilgisi
wine
wine_color=EB5E5E

# I/O bilgisi
io_read
io_write
io_color=A855F7

# Battery (laptop için)
battery
battery_color=FFFFFF

# Graph
gpu_load_change
cpu_load_change
fps_limit=0

# Position
position=top-right
table_columns=3
background_alpha=0.4
round_corners=10

# Toggle key
toggle_hud=F12
toggle_logging=F11
output_folder=/tmp/mangohud
